<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Tag</title>
</head>
<body>

    <!--the hr tag is used to create a horizontal line in the webpage
    //its not like the br tag which just lets u come to next line
    //the hr tag just divides the webpage into two parts with a horizontal line in between
    //it is a self closing tag and it is a block level element-->
    
    <p>this is my name mihika</p>
    <p>im a web developer</p>
    
    <hr> <!--this will create a horizontal line in the webpage and it will divide the webpage into two parts-->
    
    <p>i am a student</p>
    <p>i like coding</p>
</body>
</html>
