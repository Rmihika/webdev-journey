<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sub&sup</title>
</head>
<body>
    <!--sup tag is used to put content in small above main coontent for eg a square-->
    <h1>a<sup>2</sup></h1>


    <!--sub tag is used to put content in small below main content for eg a waters formula h20-->
    <h1>H<sub>2</sub>O</h1>
</body>
</html>
