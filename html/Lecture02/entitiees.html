<body>
    <h1>a&lt; b</h1> <!--less than sign-->
    <h1>a&gt; b</h1> <!--greater than sign-->
    <h1>mihika &nbsp; raut</h1> <!--nbsp for space in between words-->

    <p>
        a &lt; b
    </p>

    <p>
        a &gt; b 
    </p>

    <p>
        a &amp; b <!--amp for and sign-->
    </p>

    <p>
        &quot;mihika raut&quot;  <!--for double quotes-->
    </p>

    <h1> The sky is cloudy  &#127783;  &amp; it will &#9748; today</h1>
    
    <h3>Today is 9<sup>th</sup> of October and 2<sup>4</sup>=16 always</h3>

</body>
