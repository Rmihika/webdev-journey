<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>select</title>
</head>
<body>
    <form action="/action">
    <div>
        Choose your favourite sport:
        <select id="sport" name="sport">
            <option value="Badminton" >Badminton</option>
            <option value="hockey">Hokcey</option>
            <option value="swimming">Swimming</option>
        </select>

        <button type="submit">Submit</button>
    </div>

    
        
        <div>
            <label for="vol" >Select your volume level</label>
                <input type="range" min="0" max="100" id="vol">
        <button type="submit">Submit</button>
        </div>
       
        <label for="feedback">give ur feedback</label>
        <textarea id="feedback" name="feedback" rows="5" cols="10"></textarea>
        <button type="submit">submit</button>
    </form>
</body>
</html>
