<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form action="/action">
        <input type="text" placeholder="First Name" id="firstname" name="fname">
        <input type="text" placeholder="Last Name" id="lastname" name="lname">
        <br>
        <label for="gender">Please select gender</label>
        <select id="gender" name="gender">
            <option value="m">Male</option>
            <option value="f">Female</option>
            <option value="o">Other</option>
        </select>
        <br> 
        <label for="tos">Do you agree to all terms of service?</label>
        <input type="checkbox" id="tos" name="tos">
        <label for="tos">Yes, I agree</label>
        <br>
        <button type="submit">Register</button>
    </form>
    

    
    
</body>
</html>
