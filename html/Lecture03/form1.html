<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action">
    <label for="name">Name:</label>
    <input type="text" id="name" value="name" name="name">

    <br>
    <br>

    <label for="sex">Sex:</label>
    <input type="radio" id="sex" name="sex" value="male">
    <label for="male">Male</label>
    <input type="radio" id="sex" name="sex" value="female">
    <label for="female">Female</label>

    <br>
    <br>

    <label for="country">Country:</label>
    <select id="country" name="country"> 
        <option value="India">India</option>
        <option value="Nepal">Nepal</option>
        <option value="USA">USA</option>
        <option value="Canada">Canada</option>
    </select>

    <br>
    <br>

    <label for="message">Message:</label>
    <br>
    <textarea id="message" rows="4" cols="25"  name="message"></textarea>
    <br>
    <br>
    <input type="checkbox" id="checkbox" name="chekcbox">
    
    <label for="checkbox">Subscribe?</label>
    <br>
    <br>
    <button type="submit">Submit</button>
    </form>
</body>
</html>
