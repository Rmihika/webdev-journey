<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buttons</title>
</head>
<body>

    <form action="/actions">
        <div>
            <label for="username">Enter username: </label>
            <input type="text"  id="username" placeholder="Username" name="ourusername"/> 
        </div>
         
        <div>
            <label for="pass">Enter password</label>
            <input type="password" id="pass" placeholder="password" name="ourpass"/>
        </div>

        <div>
            <label for="age">Enter age</label>
            <input type="number" id="age" placeholder="Age"/>
        </div>

        <button type="submit">submit</button>
        
    </form>
    
    <form action="https://www.youtube.com/results?search_query">
    <input type="text" placeholder="search" id="yt" name="search_query"/>
    <button type="submit">search</button>
    </form>

    <br>
    <br>

    <form action="https://www.google.com/search?q">
        <input type="text" placeholder="search" id="googlesearch" name="q">
        <button type="submit">search</button>
    </form>
</body>
</html>
